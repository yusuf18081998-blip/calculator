<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #4a6fd4 0%, #7b9fe8 50%, #5a82e0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .phone {
    width: 320px;
    background: #1a1a1a;
    border-radius: 50px;
    padding: 14px;
    box-shadow:
      0 0 0 1.5px #3a3a3a,
      0 40px 80px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
  }

  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    right: -3px;
    top: 120px;
    width: 3px;
    height: 60px;
    background: #2a2a2a;
    border-radius: 0 2px 2px 0;
    box-shadow: 0 75px 0 #2a2a2a;
  }
  .phone::after {
    content: '';
    position: absolute;
    left: -3px;
    top: 100px;
    width: 3px;
    height: 35px;
    background: #2a2a2a;
    border-radius: 2px 0 0 2px;
    box-shadow: 0 50px 0 #2a2a2a, 0 95px 0 #2a2a2a;
  }

  .screen {
    background: #000;
    border-radius: 40px;
    overflow: hidden;
    padding: 0;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 4px;
    background: #000;
  }
  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-icons svg {
    width: 16px;
    height: 12px;
    fill: white;
  }
  .battery {
    width: 25px;
    height: 12px;
    border: 1.5px solid white;
    border-radius: 3px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 1.5px;
  }
  .battery::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 5px;
    background: white;
    border-radius: 0 1px 1px 0;
  }
  .battery-fill {
    width: 75%;
    height: 100%;
    background: white;
    border-radius: 1px;
  }

  /* Dynamic island */
  .dynamic-island {
    width: 120px;
    height: 32px;
    background: #000;
    border-radius: 20px;
    margin: 6px auto 0;
    box-shadow: 0 0 0 1px #1a1a1a;
  }

  /* Calculator area */
  .calc-body {
    background: #000;
    padding: 0 16px 20px;
  }

  /* Hamburger menu */
  .menu-icon {
    padding: 12px 0 0 4px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 22px;
    cursor: pointer;
    opacity: 0.8;
  }
  .menu-line {
    height: 2px;
    background: #e8700a;
    border-radius: 1px;
  }
  .menu-line:first-child { width: 100%; }
  .menu-line:nth-child(2) { width: 70%; }
  .menu-line:last-child { width: 100%; }

  /* Display */
  .display {
    padding: 10px 4px 16px;
    text-align: right;
  }
  .expression {
    font-size: 22px;
    color: rgba(255,255,255,0.45);
    font-weight: 300;
    letter-spacing: -0.5px;
    min-height: 28px;
    margin-bottom: 2px;
  }
  .result {
    font-size: 68px;
    color: #fff;
    font-weight: 300;
    letter-spacing: -3px;
    line-height: 1;
    min-height: 72px;
  }

  /* Buttons grid */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .btn {
    aspect-ratio: 1;
    border: none;
    border-radius: 50%;
    font-size: 26px;
    font-weight: 400;
    cursor: pointer;
    transition: transform 0.08s, filter 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active {
    transform: scale(0.92);
    filter: brightness(1.3);
  }

  .btn-gray { background: #a4a4a4; color: #000; }
  .btn-dark { background: #333333; color: #fff; }
  .btn-orange { background: #ff9500; color: #fff; }
  .btn-orange.active { background: #fff; color: #ff9500; }

  /* Special: 0 button takes 2 cols */
  .btn-zero {
    aspect-ratio: unset;
    border-radius: 40px;
    grid-column: span 2;
    justify-content: flex-start;
    padding-left: 28px;
    font-size: 26px;
  }

  .btn-small-icon { font-size: 18px; }

  /* Home indicator */
  .home-indicator {
    background: #000;
    padding: 10px 0 12px;
    display: flex;
    justify-content: center;
  }
  .home-bar {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.35);
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-time">11:31</div>
      <div class="status-icons">
        <!-- Signal -->
        <svg viewBox="0 0 17 12"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5"/><rect x="9" y="3" width="3" height="9" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" opacity="0.3"/></svg>
        <!-- WiFi -->
        <svg viewBox="0 0 16 12" width="16"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zM8 5.5c1.8 0 3.4.7 4.6 1.9l-1.4 1.4C10.3 7.7 9.2 7.2 8 7.2s-2.3.5-3.2 1.6L3.4 7.4C4.6 6.2 6.2 5.5 8 5.5zm0-4C11 1.5 13.7 2.8 15.5 5L14 6.5C12.6 4.8 10.4 3.7 8 3.7S3.4 4.8 2 6.5L.5 5C2.3 2.8 5 1.5 8 1.5z"/></svg>
        <!-- Battery -->
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>

    <!-- Dynamic Island -->
    <div class="dynamic-island"></div>

    <!-- Calculator -->
    <div class="calc-body">
      <div class="menu-icon">
        <div class="menu-line"></div>
        <div class="menu-line"></div>
        <div class="menu-line"></div>
      </div>

      <div class="display">
        <div class="expression" id="expr">8Ã—2</div>
        <div class="result" id="result">16</div>
      </div>

      <div class="buttons">
        <!-- Row 1 -->
        <button class="btn btn-gray" onclick="handleBtn('AC')">AC</button>
        <button class="btn btn-gray" onclick="handleBtn('+/-')">+/âˆ’</button>
        <button class="btn btn-gray btn-small-icon" onclick="handleBtn('%')">%</button>
        <button class="btn btn-orange" id="div" onclick="handleBtn('Ã·')">Ã·</button>

        <!-- Row 2 -->
        <button class="btn btn-dark" onclick="handleBtn('7')">7</button>
        <button class="btn btn-dark" onclick="handleBtn('8')">8</button>
        <button class="btn btn-dark" onclick="handleBtn('9')">9</button>
        <button class="btn btn-orange" id="mul" onclick="handleBtn('Ã—')">Ã—</button>

        <!-- Row 3 -->
        <button class="btn btn-dark" onclick="handleBtn('4')">4</button>
        <button class="btn btn-dark" onclick="handleBtn('5')">5</button>
        <button class="btn btn-dark" onclick="handleBtn('6')">6</button>
        <button class="btn btn-orange" id="sub" onclick="handleBtn('âˆ’')">âˆ’</button>

        <!-- Row 4 -->
        <button class="btn btn-dark" onclick="handleBtn('1')">1</button>
        <button class="btn btn-dark" onclick="handleBtn('2')">2</button>
        <button class="btn btn-dark" onclick="handleBtn('3')">3</button>
        <button class="btn btn-orange" id="add" onclick="handleBtn('+')">+</button>

        <!-- Row 5 -->
        <button class="btn btn-dark btn-small-icon" onclick="handleBtn('hist')">ðŸ—‚</button>
        <button class="btn btn-dark btn-zero" onclick="handleBtn('0')">0</button>
        <button class="btn btn-dark btn-small-icon" onclick="handleBtn('.')">.</button>
        <button class="btn btn-orange" onclick="handleBtn('=')">=</button>
      </div>
    </div>

    <div class="home-indicator">
      <div class="home-bar"></div>
    </div>
  </div>
</div>

<script>
  let current = '16', operator = null, prev = '8', justCalc = false;

  const display = document.getElementById('result');
  const expr = document.getElementById('expr');
  const ops = { 'Ã·': '/', 'Ã—': '*', 'âˆ’': '-', '+': '+' };
  const opBtns = { 'Ã·': 'div', 'Ã—': 'mul', 'âˆ’': 'sub', '+': 'add' };

  function setActive(op) {
    ['div','mul','sub','add'].forEach(id => {
      document.getElementById(id)?.classList.remove('active');
    });
    if (op && opBtns[op]) document.getElementById(opBtns[op]).classList.add('active');
  }

  function handleBtn(val) {
    if (['Ã·','Ã—','âˆ’','+'].includes(val)) {
      prev = current; operator = val; justCalc = false;
      expr.textContent = current + val;
      setActive(val);
      return;
    }
    if (val === '=') {
      if (!operator) return;
      const a = parseFloat(prev), b = parseFloat(current);
      let res;
      switch(operator) {
        case 'Ã·': res = b !== 0 ? a / b : 'Error'; break;
        case 'Ã—': res = a * b; break;
        case 'âˆ’': res = a - b; break;
        case '+': res = a + b; break;
      }
      expr.textContent = prev + operator + current;
      current = String(parseFloat(res.toFixed(9)));
      display.textContent = current;
      // font size auto
      display.style.fontSize = current.length > 9 ? '42px' : current.length > 6 ? '54px' : '68px';
      operator = null; justCalc = true; setActive(null);
      return;
    }
    if (val === 'AC') {
      current = '0'; operator = null; prev = ''; expr.textContent = '';
      display.textContent = '0'; display.style.fontSize = '68px'; setActive(null);
      return;
    }
    if (val === '+/-') { current = String(parseFloat(current) * -1); display.textContent = current; return; }
    if (val === '%') { current = String(parseFloat(current) / 100); display.textContent = current; return; }
    if (val === 'hist') return;
    if (val === '.') {
      if (!current.includes('.')) { current += '.'; display.textContent = current; }
      return;
    }
    if (justCalc || current === '0') { current = val; justCalc = false; }
    else { if (current.length < 9) current += val; }
    display.textContent = current;
    display.style.fontSize = current.length > 9 ? '42px' : current.length > 6 ? '54px' : '68px';
  }
</script>
</body>
</html>
